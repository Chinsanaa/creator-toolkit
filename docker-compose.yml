services:
  backend:
    build:
      context: ./backend
    ports:
      - '3001:3001'
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend
